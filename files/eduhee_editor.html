        <span class="label">글자색</span>
        <div class="swatches" id="txColors">
          ${TEXT_COLORS.map(c =>
            `<button class="swatch" data-c="${c}" style="background:${c}" aria-pressed="${item.color === c}" aria-label="${c}"></button>`).join('')}
        </div>
      </div>
      <div class="field">
        <span class="label">배경</span>
        <div class="seg" id="segBg">
          <button data-b="1" aria-pressed="${item.bg}">검은 박스</button>
          <button data-b="0" aria-pressed="${!item.bg}">외곽선</button>
        </div>
      </div>
      <div class="field">
        <span class="label">표시 구간</span>
        <div class="row">
          <input class="input" type="number" id="txStart" step="0.1" min="0" value="${item.start.toFixed(1)}">
          <span style="color:var(--ink-faint)">→</span>
          <input class="input" type="number" id="txEnd" step="0.1" min="0" value="${item.end.toFixed(1)}">
        </div>
      </div>
      ${S.texts.length > 1 ? `
      <div class="field">
        <button class="btn" id="btnApplyAll" style="width:100%;justify-content:center">
          이 모양을 자막 ${S.texts.length}개 전부에 적용
        </button>
        <div class="hint">글꼴·크기·색·위치를 한 번에 통일합니다. 내용과 시간은 그대로입니다.</div>
      </div>` : ''}` + aspectSeg;
  } else {
    const m = mediaById(item.mediaId) || {};
    const len = item.outP - item.inP;
    const isImg = m.kind === 'image';
    const isAudio = m.kind === 'audio';
    const spd = clipSpeed(item);
    const tlLen = clipLen(item);

    const imgControls = `
      <div class="field">
        <span class="label">영상 길이</span>
        <div class="row">
          <input type="range" id="imgLen" min="1" max="${IMG_MAX}" step="0.5" value="${len}">
          <span class="num">${len.toFixed(1)}s</span>
        </div>
        <div class="hint">사진 한 장으로 최대 ${IMG_MAX}초까지 만들 수 있습니다.</div>
      </div>
      <div class="field">
        <label class="label" for="imgMotion">카메라 움직임</label>
        <select class="input" id="imgMotion">
          ${Object.entries(MOTIONS).map(([k, v]) =>
            `<option value="${k}"${(item.motion || 'none') === k ? ' selected' : ''}>${v}</option>`).join('')}
        </select>
        <div class="hint">가만히 있는 사진에 움직임을 줘서 영상처럼 보이게 합니다.</div>
      </div>`;

    /* 배속 — 영상·소리 클립에 붙는다 (사진은 '영상 길이'로 조절) */
    const speedControl = `
      <div class="field">
        <span class="label">배속 <span style="color:var(--rec)">NEW</span></span>
        <div class="seg" id="segSpeed">
          ${[0.5, 1, 1.5, 2].map(s =>
            `<button data-s="${s}" aria-pressed="${Math.abs(spd - s) < 0.001}">${s}x</button>`).join('')}
        </div>
        <div class="row" style="margin-top:6px">
          <input type="range" id="clSpeed" min="0.25" max="4" step="0.05" value="${spd}">
          <span class="num">${spd.toFixed(2)}x</span>
        </div>
        <div class="hint">타임라인 길이 ${tlLen.toFixed(1)}초 · 슬로우(0.25x)~빠르게(4x). 소리 높낮이도 함께 변합니다.</div>
      </div>`;

    const videoControls = `
      <div class="field">
        <span class="label">소리 크기</span>
        <div class="row">
          <input type="range" id="clVol" min="0" max="1" step="0.01" value="${item.vol}">
          <span class="num">${Math.round(item.vol * 100)}%</span>
        </div>
      </div>
      <div class="field">
        <span class="label">시작 지점 다듬기</span>
        <div class="row">
          <input type="range" id="clIn" min="0" max="${(m.dur || 1).toFixed(2)}" step="0.05" value="${item.inP}">
          <span class="num">${item.inP.toFixed(1)}s</span>
        </div>
      </div>
      <div class="field">
        <span class="label">끝 지점 다듬기</span>
        <div class="row">
          <input type="range" id="clOut" min="0" max="${(m.dur || 1).toFixed(2)}" step="0.05" value="${item.outP}">
          <span class="num">${item.outP.toFixed(1)}s</span>
        </div>
      </div>`;

    /* 화면 움직임(줌 강조) — 영상 클립에도 적용 */
    const motionControl = `
      <div class="field">
        <label class="label" for="clMotion">화면 움직임 · 줌 강조 <span style="color:var(--rec)">NEW</span></label>
        <select class="input" id="clMotion">
          ${Object.entries(MOTIONS).map(([k, v]) =>
            `<option value="${k}"${(item.motion || 'none') === k ? ' selected' : ''}>${v}</option>`).join('')}
        </select>
        <div class="hint">중요한 순간에 화면을 천천히 확대해 시선을 모읍니다.</div>
      </div>`;

    /* 전환효과 — 앞 장면에서 이 클립으로 넘어올 때 (영상·사진 클립만) */
    const isFirst = S.clips.length && S.clips[0].id === item.id;
    const transControl = (S.selected.type === 'clip') ? `
      <div class="field">
        <label class="label" for="clTrans">전환효과 · 앞 장면에서 넘어올 때 <span style="color:var(--rec)">NEW</span></label>
        <select class="input" id="clTrans">
          ${Object.entries(TRANSITIONS).map(([k, v]) =>
            `<option value="${k}"${(item.trans || 'none') === k ? ' selected' : ''}>${v}</option>`).join('')}
        </select>
        ${(item.trans && item.trans !== 'none') ? `
        <div class="row" style="margin-top:6px">
          <span class="label" style="margin:0">길이</span>
          <input type="range" id="clTransDur" min="0.2" max="1.5" step="0.1" value="${item.transDur || 0.5}">
          <span class="num">${(item.transDur || 0.5).toFixed(1)}s</span>
        </div>` : ''}
        ${isFirst ? `<div class="hint">맨 앞 클립에는 전환이 없습니다. 두 번째 클립부터 골라주세요.</div>` : ''}
        ${S.clips.length > 1 ? `<button class="btn sm" id="btnTransAll" style="width:100%;justify-content:center;margin-top:8px">모든 클립에 이 전환 적용</button>` : ''}
      </div>` : '';

    const lookControls = `
      <div class="field">
        <label class="label" for="clLook">색감</label>
        <select class="input" id="clLook">
          ${Object.entries(LOOKS).map(([k, l]) =>
            `<option value="${k}"${(item.look || 'none') === k ? ' selected' : ''}>${l.label}</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <span class="label">밝기</span>
        <div class="row">
          <input type="range" id="clBright" min="0.5" max="1.6" step="0.02" value="${item.bright == null ? 1 : item.bright}">
          <span class="num">${Math.round((item.bright == null ? 1 : item.bright) * 100)}%</span>
        </div>
      </div>
      <div class="field">
        <span class="label">선명도</span>
        <div class="row">
          <input type="range" id="clContrast" min="0.5" max="1.6" step="0.02" value="${item.contrast == null ? 1 : item.contrast}">
          <span class="num">${Math.round((item.contrast == null ? 1 : item.contrast) * 100)}%</span>
        </div>
      </div>
      <div class="field">
        <span class="label">서서히 나타나기</span>
        <div class="row">
          <input type="range" id="clFadeIn" min="0" max="3" step="0.1" value="${item.fadeIn || 0}">
          <span class="num">${(item.fadeIn || 0).toFixed(1)}s</span>
        </div>
      </div>
      <div class="field">
        <span class="label">서서히 사라지기</span>
        <div class="row">
          <input type="range" id="clFadeOut" min="0" max="3" step="0.1" value="${item.fadeOut || 0}">
          <span class="num">${(item.fadeOut || 0).toFixed(1)}s</span>
        </div>
        <div class="hint">화면이 어두워질 때 소리도 함께 잦아듭니다.</div>
      </div>
      ${S.clips.length > 1 ? `
      <div class="field">
        <button class="btn" id="btnAutoTrans" style="width:100%;justify-content:center">
          클립 ${S.clips.length}개 사이에 전환 넣기
        </button>
        <div class="hint">이어지는 장면들이 자연스럽게 넘어갑니다.</div>
      </div>` : ''}`;

    const header = `
      <div class="field">
        <span class="label">${isImg ? '사진' : isAudio ? '소리 클립' : '영상 클립'}</span>
        <div style="font-size:12px;word-break:break-all">${escapeHtml(m.name || '')}</div>
        <div class="mspec" style="margin-top:3px">타임라인 길이 ${tlLen.toFixed(2)}초</div>
      </div>`;

    if (isImg) {
      // 사진: 길이·모션 → 전환 → 색감
      box.innerHTML = header + imgControls + transControl + lookControls + aspectSeg;
    } else if (isAudio) {
      // 소리: 배속·볼륨·다듬기만 (색감·전환은 의미 없음)
      box.innerHTML = header + speedControl + videoControls + aspectSeg;
    } else {
      // 영상: 배속 → 볼륨·다듬기 → 줌 강조 → 전환 → 색감
      box.innerHTML = header + speedControl + videoControls + motionControl + transControl + lookControls + aspectSeg;
    }
  }

  bindProps(item);
}

function bindProps(item) {
  const on = (id, ev, fn) => { const el = $(id); if (el) el.addEventListener(ev, fn); };

  const seg = $('segAspect');
  if (seg) seg.onclick = (e) => {
    const b = e.target.closest('button'); if (!b) return;
    S.aspect = b.dataset.a;
    applyAspect();
    renderProps();
  };
  const segF = $('segFit');
  if (segF) segF.onclick = (e) => {
    const b = e.target.closest('button'); if (!b) return;
    S.fit = b.dataset.f;
    renderProps();
  };
  on('cropY', 'input', (e) => { S.cropY = +e.target.value; e.target.nextElementSibling.textContent = Math.round(S.cropY * 100) + '%'; requestRender(); });

  on('btnPickFirst', 'click', () => {
    if (S.clips.length) S.selected = { type: 'clip', id: S.clips[0].id };
    else if (S.audio.length) S.selected = { type: 'audio', id: S.audio[0].id };
    else if (S.texts.length) S.selected = { type: 'text', id: S.texts[0].id };
    syncAll();
  });

  if (!item) return;

  if (S.selected.type === 'overlay') {
    const seg = $('segMosaic');
    if (seg) seg.onclick = (e) => {
      const b = e.target.closest('button'); if (!b) return;
      item.style = b.dataset.s;
      renderProps(); requestRender();
    };
    on('ovW', 'input', (e) => { item.w = +e.target.value; e.target.nextElementSibling.textContent = Math.round(item.w*100)+'%'; requestRender(); });
    on('ovH', 'input', (e) => { item.h = +e.target.value; e.target.nextElementSibling.textContent = Math.round(item.h*100)+'%'; requestRender(); });
    on('ovCell', 'input', (e) => { item.cell = +e.target.value; e.target.nextElementSibling.textContent = item.cell; requestRender(); });
    on('ovSize', 'input', (e) => { item.size = +e.target.value; e.target.nextElementSibling.textContent = Math.round(item.size*100)+'%'; requestRender(); });
    on('ovEmoji', 'input', (e) => { item.emoji = e.target.value || '😀'; renderTimeline(); requestRender(); });
    const tabs = $('ovTabs');
    if (tabs) tabs.onclick = (e) => {
      const b = e.target.closest('button'); if (!b) return;
      stickerTab = b.dataset.g;
      renderProps();
    };
    const pick = $('ovPick');
    if (pick) pick.onclick = (e) => {
      const b = e.target.closest('button'); if (!b) return;
      item.emoji = b.dataset.s;
      renderProps(); renderTimeline(); requestRender();
    };
    on('ovStart', 'change', (e) => { item.start = Math.max(0, +e.target.value); if (item.end <= item.start) item.end = item.start + 1; syncAll(); });
    on('ovEnd', 'change', (e) => { item.end = Math.max(item.start + 0.2, +e.target.value); syncAll(); });
    on('btnSpanAll', 'click', () => {
      const span = overlaySpan();
      item.start = span.start;
      item.end = span.end;
      syncAll();
      toast('영상 내내 보이도록 바꿨습니다.', 'good');
    });
    return;
  }

  if (S.selected.type === 'text') {
    on('txContent', 'input', (e) => { item.content = e.target.value; renderTimeline(); requestRender(); });
    on('txSize', 'input', (e) => { item.size = +e.target.value; e.target.nextElementSibling.textContent = item.size; requestRender(); });
    on('txY', 'input', (e) => { item.yPct = +e.target.value; e.target.nextElementSibling.textContent = Math.round(item.yPct * 100) + '%'; requestRender(); });
    const cols = $('txColors');
    if (cols) cols.onclick = (e) => {
      const b = e.target.closest('button'); if (!b) return;
      item.color = b.dataset.c;
      cols.querySelectorAll('.swatch').forEach(s => s.setAttribute('aria-pressed', s.dataset.c === item.color));
      requestRender();
    };
    const bg = $('segBg');
    if (bg) bg.onclick = (e) => {
      const b = e.target.closest('button'); if (!b) return;
      item.bg = b.dataset.b === '1';
      bg.querySelectorAll('button').forEach(x => x.setAttribute('aria-pressed', (x.dataset.b === '1') === item.bg));
      requestRender();
    };
    on('txFont', 'change', (e) => { item.font = e.target.value; requestRender(); });
    on('txAnim', 'change', (e) => { item.anim = e.target.value; requestRender(); });
    const wSeg = $('segWeight');
    if (wSeg) wSeg.onclick = (e) => {
      const b = e.target.closest('button'); if (!b) return;
      item.weight = +b.dataset.w;
      wSeg.querySelectorAll('button').forEach(x => x.setAttribute('aria-pressed', +x.dataset.w === item.weight));
      requestRender();
    };
    on('btnApplyAll', 'click', () => {
      for (const t of S.texts) {
        if (t === item) continue;
        t.font = item.font; t.weight = item.weight; t.size = item.size;
        t.color = item.color; t.yPct = item.yPct; t.bg = item.bg;
        t.anim = item.anim;
      }
      requestRender();
      toast(`자막 ${S.texts.length}개의 모양을 통일했습니다.`, 'good');
    });
    on('txStart', 'change', (e) => { item.start = Math.max(0, +e.target.value); if (item.end <= item.start) item.end = item.start + 1; syncAll(); });
    on('txEnd', 'change', (e) => { item.end = Math.max(item.start + 0.2, +e.target.value); syncAll(); });
  } else {
    on('imgLen', 'input', (e) => {
      item.outP = item.inP + (+e.target.value);
      e.target.nextElementSibling.textContent = (+e.target.value).toFixed(1) + 's';
      relayoutVideo(); renderTimeline(); updateTimecode(); requestRender();
    });
    on('imgMotion', 'change', (e) => { item.motion = e.target.value; requestRender(); });

    // 배속
    on('clSpeed', 'input', (e) => {
      item.speed = clamp(+e.target.value, 0.25, 4);
      e.target.nextElementSibling.textContent = item.speed.toFixed(2) + 'x';
      if (S.selected.type === 'clip') relayoutVideo();
      renderTimeline(); updateTimecode(); requestRender();
    });
    const segSpeed = $('segSpeed');
    if (segSpeed) segSpeed.onclick = (e) => {
      const b = e.target.closest('button'); if (!b) return;
      item.speed = +b.dataset.s;
      if (S.selected.type === 'clip') relayoutVideo();
      renderProps(); renderTimeline(); updateTimecode(); requestRender();
    };
    // 화면 움직임(줌 강조) — 영상 클립
    on('clMotion', 'change', (e) => { item.motion = e.target.value; requestRender(); });
    // 전환효과
    on('clTrans', 'change', (e) => {
      item.trans = e.target.value;
      if (item.trans !== 'none' && !item.transDur) item.transDur = 0.5;
      renderProps(); renderTimeline(); requestRender();
    });
    on('clTransDur', 'input', (e) => {
      item.transDur = +e.target.value;
      e.target.nextElementSibling.textContent = item.transDur.toFixed(1) + 's';
      requestRender();
    });
    on('btnTransAll', 'click', () => {
      const ty = item.trans || 'none', du = item.transDur || 0.5;
      S.clips.forEach((c, i) => { if (i === 0) return; c.trans = ty; c.transDur = du; });
      renderProps(); renderTimeline(); requestRender();
      toast(ty === 'none' ? '모든 전환을 없앴습니다.'
                          : `모든 클립에 '${TRANSITIONS[ty]}' 전환을 넣었습니다.`, 'good');
    });

    on('clLook', 'change', (e) => { item.look = e.target.value; requestRender(); });
    on('clBright', 'input', (e) => {
      item.bright = +e.target.value;
      e.target.nextElementSibling.textContent = Math.round(item.bright * 100) + '%';
      requestRender();
    });
    on('clContrast', 'input', (e) => {
      item.contrast = +e.target.value;
      e.target.nextElementSibling.textContent = Math.round(item.contrast * 100) + '%';
      requestRender();
    });
    on('clFadeIn', 'input', (e) => {
      item.fadeIn = +e.target.value;
      e.target.nextElementSibling.textContent = item.fadeIn.toFixed(1) + 's';
      requestRender();
    });
    on('clFadeOut', 'input', (e) => {
      item.fadeOut = +e.target.value;
      e.target.nextElementSibling.textContent = item.fadeOut.toFixed(1) + 's';
      requestRender();
    });
    on('btnAutoTrans', 'click', () => {
      // 클립마다 앞뒤로 짧은 페이드를 넣으면 장면이 부드럽게 이어진다
      S.clips.forEach((c, i) => {
        const len = c.outP - c.inP;
        const d = Math.min(0.5, len / 4);
        c.fadeIn = i === 0 ? (c.fadeIn || 0) : d;
        c.fadeOut = i === S.clips.length - 1 ? (c.fadeOut || 0) : d;
      });
      syncAll();
      toast(`클립 ${S.clips.length}개 사이에 전환을 넣었습니다.`, 'good');
    });
    on('clVol', 'input', (e) => { item.vol = +e.target.value; e.target.nextElementSibling.textContent = Math.round(item.vol * 100) + '%'; });
    on('clIn', 'input', (e) => {
      item.inP = Math.min(+e.target.value, item.outP - 0.2);
      e.target.nextElementSibling.textContent = item.inP.toFixed(1) + 's';
      if (S.selected.type === 'clip') relayoutVideo();
      renderTimeline();
    });
    on('clOut', 'input', (e) => {
      item.outP = Math.max(+e.target.value, item.inP + 0.2);
      e.target.nextElementSibling.textContent = item.outP.toFixed(1) + 's';
      if (S.selected.type === 'clip') relayoutVideo();
      renderTimeline();
    });
  }
}

function applyAspect() {
  const [w, h] = ASPECTS[S.aspect];
  canvas.width = w; canvas.height = h;
  lastClipId = null;
  fitPreview();
  requestRender();
}

/* 미리보기 화면을 남는 공간에 딱 맞춘다.
   여기가 틀어지면 캔버스 아랫부분이 화면 밖으로 나가고,
   하필 자막이 아래쪽에 있어서 자막만 안 보이는 것처럼 된다. */
let fitW = 0, fitH = 0, fitAr = 0;

function fitPreview() {
  const wrap = canvas.parentElement;
  if (!wrap) return;
  const availW = wrap.clientWidth - 32;
  const availH = wrap.clientHeight - 32;
  // 레이아웃이 아직 안 잡혔으면 건드리지 않는다 (여기서 잘못 잡으면 계속 작게 남는다)
  if (availW < 40 || availH < 30) return;

  const ar = canvas.width / canvas.height;
  let w = availW, h = availW / ar;
  if (h > availH) { h = availH; w = availH * ar; }

  canvas.style.width = Math.floor(w) + 'px';
  canvas.style.height = Math.floor(h) + 'px';
  fitW = wrap.clientWidth; fitH = wrap.clientHeight; fitAr = ar;
}

/* ResizeObserver도 렌더링 파이프라인을 타기 때문에 그게 멈춘 환경에서는
   알림이 오지 않는다. 알림을 기다리지 말고 주기적으로 직접 확인한다. */
let lastFitCheck = 0;
function checkPreviewSize(ts) {
  if (ts - lastFitCheck < 350) return;
  lastFitCheck = ts;
  const wrap = canvas.parentElement;
  if (!wrap) return;
  const ar = canvas.width / canvas.height;
  if (wrap.clientWidth !== fitW || wrap.clientHeight !== fitH || ar !== fitAr) {
    fitPreview();
    dirty = true;
  }
}

if (typeof ResizeObserver === 'function') {
  new ResizeObserver(() => { fitPreview(); requestRender(); })
    .observe(canvas.parentElement);
}
window.addEventListener('resize', () => { fitPreview(); requestRender(); });

/* ══════════════════════════════════════════════════════════
   전체 갱신
   ══════════════════════════════════════════════════════════ */
function syncAll() {
  renderTimeline();
  renderMediaList();     // 사용 개수 표시가 항상 맞게
  renderProps();
  updateTimecode();
  requestRender();
  const has = totalDuration() > 0;
  $('btnPlay').disabled = !has;
  $('btnExport').disabled = !has;
  $('btnSplit').disabled = !S.clips.length;
  $('btnDelete').disabled = !S.selected;
  $('btnAutoSub').disabled = !subtitleTargets().length;
}

/* ══════════════════════════════════════════════════════════
   타임라인 조작 (선택 · 이동 · 다듬기)
   ══════════════════════════════════════════════════════════ */
let drag = null;

$('tlInner').addEventListener('pointerdown', (e) => {
  if (S.exporting) return;
  if (e.button != null && e.button !== 0) return;   // 왼쪽 단추만
  e.preventDefault();                                // 글자 드래그 선택이 끼어들지 않게
  const clipEl = e.target.closest('.clip');

  // 눈금자 또는 빈 곳 → 재생헤드 이동
  if (!clipEl) {
    const rect = $('tlInner').getBoundingClientRect();
    seek((e.clientX - rect.left) / S.pxPerSec);
    if (e.target.closest('.ruler')) {
      drag = { mode: 'scrub' };
      $('tlInner').setPointerCapture(e.pointerId);
    } else {
      S.selected = null;
      syncAll();
    }
    return;
  }

  const type = clipEl.dataset.type;
  const item = itemsOf(type).find(i => i.id === clipEl.dataset.id);
  if (!item) return;

  S.selected = { type, id: item.id };
  syncAll();

  const handle = e.target.closest('.handle');
  pushHistory();          // 끌기 시작 전 상태를 기록해 둔다
  drag = {
    mode: handle ? (handle.classList.contains('l') ? 'trimL' : 'trimR') : 'move',
    item, type,
    x0: e.clientX,
    start0: item.start,
    in0: item.inP, out0: item.outP,
    tStart0: item.start, tEnd0: item.end,
  };
  clipEl.classList.add('dragging');
  $('tlInner').setPointerCapture(e.pointerId);
});

$('tlInner').addEventListener('pointermove', (e) => {
  if (!drag) return;
  const rect = $('tlInner').getBoundingClientRect();

  if (drag.mode === 'scrub') { seek((e.clientX - rect.left) / S.pxPerSec); return; }

  const dt = (e.clientX - drag.x0) / S.pxPerSec;
  const { item, type, mode } = drag;

  if (type === 'text') {
    const len = drag.tEnd0 - drag.tStart0;
    if (mode === 'move') { item.start = Math.max(0, drag.tStart0 + dt); item.end = item.start + len; }
    else if (mode === 'trimL') { item.start = clamp(drag.tStart0 + dt, 0, drag.tEnd0 - 0.3); }
    else { item.end = Math.max(item.start + 0.3, drag.tEnd0 + dt); }
  } else {
    const m = mediaById(item.mediaId) || { dur: 1 };
    if (mode === 'trimL') item.inP = clamp(drag.in0 + dt, 0, item.outP - 0.2);
    else if (mode === 'trimR') item.outP = clamp(drag.out0 + dt, item.inP + 0.2, maxOutOf(m));
    else if (type === 'audio') item.start = Math.max(0, drag.start0 + dt);
    else {
      // 영상 클립 이동 = 순서 바꾸기
      const i = S.clips.indexOf(item);
      const target = drag.start0 + dt;
      if (dt < 0 && i > 0 && target < S.clips[i - 1].start + (S.clips[i - 1].outP - S.clips[i - 1].inP) / 2) {
        S.clips.splice(i, 1); S.clips.splice(i - 1, 0, item); drag.x0 = e.clientX; drag.start0 = item.start;
      } else if (dt > 0 && i < S.clips.length - 1) {
        const nx = S.clips[i + 1];
        if (target + (item.outP - item.inP) > nx.start + (nx.outP - nx.inP) / 2) {
          S.clips.splice(i, 1); S.clips.splice(i + 1, 0, item); drag.x0 = e.clientX; drag.start0 = item.start;
        }
      }
    }
    if (type === 'clip') relayoutVideo();
  }
  renderTimeline();
  requestRender();
});

function endDrag() {
  if (!drag) return;
  document.querySelectorAll('.clip.dragging').forEach(n => n.classList.remove('dragging'));
  drag = null;
  syncAll();
}
$('tlInner').addEventListener('pointerup', endDrag);
$('tlInner').addEventListener('pointercancel', endDrag);

/* ══════════════════════════════════════════════════════════
   미리보기에서 직접 끌어 옮기기
   슬라이더로 위치를 맞추는 건 답답하다. 화면에서 바로 잡는다.
   ══════════════════════════════════════════════════════════ */
let pvDrag = null;

// 화면 좌표를 캔버스 안의 0~1 위치로 바꾼다
function toCanvasPos(e) {
  const r = canvas.getBoundingClientRect();
  return { x: (e.clientX - r.left) / r.width, y: (e.clientY - r.top) / r.height };
}

// 그 지점에 있는 것을 찾는다 (위에 그려진 것부터)
function hitAt(p, t) {
  for (let i = S.texts.length - 1; i >= 0; i--) {
    const tx = S.texts[i];
    if (t < tx.start || t >= tx.end) continue;
    const half = (tx.size * 1.4) / canvas.height;
    if (Math.abs(p.y - tx.yPct) < half) return { type: 'text', id: tx.id };
  }
  for (let i = S.overlays.length - 1; i >= 0; i--) {
    const o = S.overlays[i];
    if (t < o.start || t >= o.end) continue;
    const hw = o.kind === 'mosaic' ? o.w / 2 : (o.size * canvas.height / canvas.width) / 2;
    const hh = o.kind === 'mosaic' ? o.h / 2 : o.size / 2;
    if (Math.abs(p.x - o.x) < hw && Math.abs(p.y - o.y) < hh) return { type: 'overlay', id: o.id };
  }
  return null;
}

/* 지금 고른 요소의 크기 손잡이를 잡았는가 */
function handleHit(p) {
  const sel = S.selected;
  if (!sel || sel.type !== 'overlay') return null;
  const o = findItem(sel);
  if (!o || S.playhead < o.start || S.playhead >= o.end) return null;
  const b = overlayBox(o);
  const hx = o.x + b.hw, hy = o.y + b.hh;
  const tol = 0.045;
  return (Math.abs(p.x - hx) < tol && Math.abs(p.y - hy) < tol) ? o : null;
}

canvas.addEventListener('pointerdown', (e) => {
  if (S.exporting) return;
  const p = toCanvasPos(e);

  // 손잡이가 먼저다 — 요소 위에 겹쳐 있으므로
  const grip = handleHit(p);
  if (grip) {
    e.preventDefault();
    pushHistory();
    pvDrag = { mode: 'resize', item: grip, hit: S.selected };
    canvas.setPointerCapture(e.pointerId);
    canvas.style.cursor = 'nwse-resize';
    return;
  }

  const hit = hitAt(p, S.playhead);
  if (!hit) {
    // 빈 곳을 누르면 선택을 푼다 — 점선도 함께 사라진다
    if (S.selected && S.selected.type === 'overlay') {
      S.selected = null;
      syncAll();
    }
    return;
  }
  e.preventDefault();

  const item = findItem(hit);
  S.selected = hit;
  syncAll();
  pushHistory();

  pvDrag = {
    mode: 'move', hit, item, p0: p,
    x0: hit.type === 'text' ? 0.5 : item.x,
    y0: hit.type === 'text' ? item.yPct : item.y,
  };
  canvas.setPointerCapture(e.pointerId);
  canvas.style.cursor = 'grabbing';
});

canvas.addEventListener('pointermove', (e) => {
  const p = toCanvasPos(e);

  if (!pvDrag) {
    // 잡을 수 있는 곳 위에서는 커서로 알려준다
    if (!S.exporting) {
      canvas.style.cursor = handleHit(p) ? 'nwse-resize'
        : hitAt(p, S.playhead) ? 'grab' : 'default';
    }
    return;
  }

  if (pvDrag.mode === 'resize') {
    const o = pvDrag.item;
    if (o.kind === 'mosaic') {
      o.w = clamp(Math.abs(p.x - o.x) * 2, 0.05, 1);
      o.h = clamp(Math.abs(p.y - o.y) * 2, 0.05, 1);
    } else {
      o.size = clamp(Math.abs(p.y - o.y) * 2, 0.04, 0.9);
    }
    requestRender();
    return;
  }

  const dx = p.x - pvDrag.p0.x, dy = p.y - pvDrag.p0.y;
  if (pvDrag.hit.type === 'text') {
    pvDrag.item.yPct = clamp(pvDrag.y0 + dy, 0.03, 0.97);
  } else {
    pvDrag.item.x = clamp(pvDrag.x0 + dx, 0, 1);
    pvDrag.item.y = clamp(pvDrag.y0 + dy, 0, 1);
  }
  requestRender();
});

function endPreviewDrag() {
  if (!pvDrag) return;
  pvDrag = null;
  canvas.style.cursor = 'default';
  renderProps();
}
canvas.addEventListener('pointerup', endPreviewDrag);
canvas.addEventListener('pointercancel', endPreviewDrag);

/* ══════════════════════════════════════════════════════════
   버튼 · 입력
   ══════════════════════════════════════════════════════════ */
/* 처음 상태로 되돌린다. 새로고침과 달리 확인창이 한 번만 뜬다. */
function resetProject() {
  const hasWork = S.media.length || S.texts.length;
  if (hasWork && !confirm('지금 작업을 모두 지우고 처음부터 시작할까요?\n\n저장하지 않은 편집 내용은 사라집니다.')) return;

  setPlaying(false);
  // 기록도 함께 비운다 — 지운 작업으로 되돌아가면 혼란스럽다
  HIST.past.length = 0; HIST.future.length = 0; HIST.lastSig = null;
  updateHistoryButtons();
  for (const m of S.media) {
    try { if (m.el && m.el.pause) m.el.pause(); } catch (e) {}
    try { if (m.gain) m.gain.disconnect(); if (m.srcNode) m.srcNode.disconnect(); } catch (e) {}
    try { URL.revokeObjectURL(m.url); } catch (e) {}
  }
  S.media = []; S.clips = []; S.texts = []; S.audio = []; S.overlays = [];
  S.playhead = 0; S.selected = null;
  S.aspect = '16:9'; S.fit = 'blur'; S.cropY = 0.5;
  lastClipId = null;

  applyAspect();
  renderMediaList();
  syncAll();
  scrollTimelineHome();
  toast('처음 상태로 돌아왔습니다.');
}

/* 속성 패널에서 뭔가를 만지기 직전 상태를 기록한다.
   슬라이더는 값이 계속 바뀌므로, 손을 대는 순간 한 번만 찍는다. */
$('propsBody').addEventListener('pointerdown', (e) => {
  if (e.target.closest('input, select, button')) pushHistory();
}, true);
$('propsBody').addEventListener('keydown', (e) => {
  if (e.target.closest('input, select, textarea')) pushHistory();
}, true);

$('btnUndo').onclick = undo;
$('btnRedo').onclick = redo;
$('btnNew').onclick = resetProject;
$('btnImport').onclick = () => $('filePicker').click();
$('drop').onclick = () => $('filePicker').click();
$('drop').onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); $('filePicker').click(); } };
$('filePicker').onchange = (e) => { importFiles([...e.target.files]); e.target.value = ''; };

$('btnImportSrt').onclick = () => $('srtPicker').click();
$('srtPicker').onchange = async (e) => {
  const f = e.target.files[0];
  if (f) importSrt(await f.text());
  e.target.value = '';
};
$('btnExportSrt').onclick = exportSrt;

const drop = $('drop');
['dragenter', 'dragover'].forEach(ev =>
  document.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.add('over'); }));
['dragleave', 'drop'].forEach(ev =>
  document.addEventListener(ev, (e) => { e.preventDefault(); if (ev === 'drop' || e.target === document.documentElement) drop.classList.remove('over'); }));
document.addEventListener('drop', (e) => {
  e.preventDefault();
  if (e.dataTransfer && e.dataTransfer.files.length) importFiles([...e.dataTransfer.files]);
});

$('btnPlay').onclick = () => setPlaying(!S.playing);
$('btnStart').onclick = () => seek(0);
$('btnEnd').onclick = () => seek(totalDuration());
$('btnSplit').onclick = splitAtPlayhead;
$('btnDelete').onclick = deleteSelected;
$('masterVol').addEventListener('input', (e) => {
  S.masterVol = (+e.target.value) / 100;
  if (S.masterVol > 0) S.muted = false;
  audioCtx();
  applyMasterVolume();
});
$('btnMute').onclick = () => {
  S.muted = !S.muted;
  audioCtx();
  applyMasterVolume();
};

$('btnRecord').onclick = askRecord;
$('btnBgm').onclick = askBGM;
$('btnAutoSub').onclick = askAutoSubtitle;
$('btnAddText').onclick = newSubtitle;
$('btnSticker').onclick = () => addSticker('😀');
$('btnMosaic').onclick = addMosaic;

function newSubtitle() {
  pushHistory();
  addText(undefined, null, null, true);
  syncAll();
  // 바로 타이핑할 수 있게 커서를 넣고 기본 문구를 잡아준다
  const box = $('txContent');
  if (box) { box.focus(); box.select(); }
}
$('btnExport').onclick = startExport;

$('btnZoomIn').onclick = () => { S.pxPerSec = clamp(S.pxPerSec * 1.4, 8, 400); updateZoom(); };
$('btnZoomOut').onclick = () => { S.pxPerSec = clamp(S.pxPerSec / 1.4, 8, 400); updateZoom(); };
function updateZoom() {
  $('zoomLabel').textContent = Math.round(S.pxPerSec / 60 * 100) + '%';
  renderTimeline();
}

$('btnTheme').onclick = () => {
  const dark = document.documentElement.getAttribute('data-theme') !== 'light';
  document.documentElement.setAttribute('data-theme', dark ? 'light' : 'dark');
  $('btnTheme').textContent = dark ? '어둡게' : '밝게';
};

$('btnHelp').onclick = () => {
  const scrim = document.createElement('div');
  scrim.className = 'scrim';
  scrim.innerHTML = `
    <div class="card">
      <h2>단축키</h2>
      <p>타임라인이나 미리보기를 클릭한 뒤 사용하세요.</p>
      <ul class="help-list">
        <li><kbd>Ctrl+Z</kbd><span>되돌리기</span></li>
        <li><kbd>Ctrl+⇧+Z</kbd><span>다시하기</span></li>
        <li><kbd>스페이스</kbd><span>재생 / 일시정지</span></li>
        <li><kbd>S</kbd><span>재생헤드 위치에서 클립 자르기</span></li>
        <li><kbd>Del</kbd><span>선택한 클립·자막 삭제</span></li>
        <li><kbd>T</kbd><span>현재 위치에 자막 추가</span></li>
        <li><kbd>← →</kbd><span>0.1초씩 이동 (Shift: 1초)</span></li>
        <li><kbd>Home</kbd><span>맨 앞으로</span></li>
        <li><kbd>End</kbd><span>맨 뒤로</span></li>
      </ul>
      <div style="margin-top:18px;display:flex;justify-content:flex-end">
        <button class="btn sm" id="btnCloseHelp">닫기</button>
      </div>
    </div>`;
  document.body.appendChild(scrim);
  const close = () => scrim.remove();
  scrim.querySelector('#btnCloseHelp').onclick = close;
  scrim.onclick = (e) => { if (e.target === scrim) close(); };
};

document.addEventListener('keydown', (e) => {
  if (S.exporting) return;
  const tag = (e.target.tagName || '').toLowerCase();
  if (tag === 'input' || tag === 'textarea' || tag === 'select') return;

  const k = e.key.toLowerCase();

  // 되돌리기 / 다시하기
  if ((e.ctrlKey || e.metaKey) && k === 'z') {
    e.preventDefault();
    if (e.shiftKey) redo(); else undo();
    return;
  }
  if ((e.ctrlKey || e.metaKey) && k === 'y') { e.preventDefault(); redo(); return; }
  if (e.ctrlKey || e.metaKey) return;   // 다른 단축키와 겹치지 않게

  if (e.code === 'Space') { e.preventDefault(); setPlaying(!S.playing); }
  else if (k === 's') { e.preventDefault(); splitAtPlayhead(); }
  else if (k === 't') { e.preventDefault(); newSubtitle(); }
  else if (e.key === 'Delete' || e.key === 'Backspace') { e.preventDefault(); deleteSelected(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); seek(S.playhead - (e.shiftKey ? 1 : 0.1)); }
  else if (e.key === 'ArrowRight') { e.preventDefault(); seek(S.playhead + (e.shiftKey ? 1 : 0.1)); }
  else if (e.key === 'Home') { e.preventDefault(); seek(0); }
  else if (e.key === 'End') { e.preventDefault(); seek(totalDuration()); }
});

window.addEventListener('beforeunload', (e) => {
  if (S.media.length) { e.preventDefault(); e.returnValue = ''; }
});

/* ══════════════════════════════════════════════════════════
   시작
   ══════════════════════════════════════════════════════════ */
applyAspect();
syncAll();
fitPreview();
updateHistoryButtons();
HIST.lastSig = signature();

/* 어떤 알림도 오지 않는 환경을 대비한 마지막 안전망.
   0.4초마다 화면 크기만 확인하고, 바뀐 게 없으면 아무것도 하지 않는다. */
setInterval(() => {
  if (S.playing) return;              // 재생 중이면 루프가 이미 돌고 있다
  checkPreviewSize(performance.now());
  if (dirty) { dirty = false; render(); }
}, 400);

// 레이아웃이 완전히 잡힌 뒤 한 번 더
window.addEventListener('load', () => { fitPreview(); requestRender(); });

})();
</script>
